name: CI Fixer (manual)

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Failing job name'
        required: false
        default: ''
      log:
        description: 'CI failure log (leave empty to auto-detect)'
        required: false
        default: ''

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Flue dependencies
        run: npm ci

      - name: Run CI fixer agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          JOB="${{ github.event.inputs.job || 'ci' }}"
          LOG="${{ github.event.inputs.log || '' }}"
          npx flue run fix-ci --target node \
            --payload "$(printf '{"job":"%s","log":"%s"}' "$JOB" "$LOG")"

      - name: Commit and push fixes
        if: success()
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "ci-fixer[bot]"
          git config user.email "ci-fixer[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ci): auto-fix CI failures

      Auto-fix applied by Flue CI fixer agent (opencode-go/kimi-k2.7-code)."
          git push
