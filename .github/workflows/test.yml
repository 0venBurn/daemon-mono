name: test

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify shipped FFF library
        run: test -f lib/libfff_c.so

      - name: Test
        run: go test ./...
